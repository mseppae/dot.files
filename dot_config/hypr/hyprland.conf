monitor=eDP-1,2256x1504@60,0x0,1.57

source = ~/.config/hypr/colors.conf

exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = hypridle

env = GTK_THEME,adw-gtk3-dark
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

cursor {
    no_hardware_cursors = true
}

input {
	kb_layout = us
	kb_options = ctrl:nocaps
	follow_mouse = 1
	touchpad {
		natural_scroll = true
		tap-to-click = true
	}
}

general {
	gaps_in = 4
	gaps_out = 8
	border_size = 2
	col.active_border = $accent
	col.inactive_border = $inactive
	layout = dwindle
}

decoration {
	rounding = 8
	blur {
		enabled = false
	}
}

animations {
	enabled = true
	bezier = myBezier, 0.05, 0.9, 0.1, 1.05
	animation = windows, 1, 5, myBezier
	animation = fade, 1, 3, default
	animation = workspaces, 1, 4, default
}

dwindle {
	pseudotile = true
	preserve_split = true
}

$mainMod = SUPER
$terminal = ghostty
$launcher = wofi --show drun

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Space, exec, $launcher
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86MonBrigthnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrigthnessDown, exec, brightnessctl set -5%

bind = , Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

bind = $mainMod, Escape, exec, hyprlock
