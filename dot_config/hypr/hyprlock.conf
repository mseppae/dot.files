source = ~/.config/hypr/hyprlock-colors.conf

background {
    monitor =
    color = $bg
}

input-field {
    monitor =
    size = 280, 48
    position = 0, -100
    halign = center
    valign = center
    outline_thickness = 2
    outer_color = $accent
    inner_color = $bg
    font_color = $fg
    fade_on_empty = true
    placeholder_text = <i>password</i>
    rounding = 8
}

label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
    color = $fg
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
    color = $muted
}
