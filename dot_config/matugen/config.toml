[config]
reload_apps = true
reload_apps_list = ["waybar", "mako"]

[templates.waybar-colors]
input_path = "~/.config/matugen/templates/waybar-colors.css"
output_path = "~/.config/waybar/colors.css"

[templates.mako-colors]
input_path = "~/.config/matugen/templates/mako-colors"
output_path = "~/.config/mako/colors"

[templates.hyprland-colors]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/hypr/colors.conf"
